name: Comment on Pull Request

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  comment-on-pr:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: read


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Comment url on PR
        uses: actions/github-script@v7
        with:
          script: |

            const prFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const mdFiles = prFiles.data.filter(file => file.filename.endsWith('.md')).map(file => file.filename);

            if (mdFiles.length === 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: 'No Markdown files detected'
              });
              return;
            }

            const head = context.payload.pull_request.head;
            const basePath = "https://chtc.github.io/article-preview?url=";
            const urls = mdFiles.map(file => `${basePath}https://raw.githubusercontent.com/${head.repo.owner.login}/${head.repo.name}/refs/heads/${head.ref}/${file}`);

            const commentBody = urls.map(url => `URL to preview article: ${url}`).join("\n\n");
            await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${commentBody}`
            });
